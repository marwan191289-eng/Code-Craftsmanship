    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash svg {
        width: 72px;
        height: 72px;
        animation: splash-pulse 1.4s ease-in-out infinite;
      }
      #splash-title {
        font-family: 'Outfit', sans-serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.25em;
        color: #fff;
        text-transform: uppercase;
      }
      #splash-sub {
        font-family: 'Outfit', sans-serif;
        font-size: 10px;
        letter-spacing: 0.35em;
        color: #c8930a;
        text-transform: uppercase;
      }
      #splash-bar {
        width: 120px;
        height: 2px;
        background: #1a1a25;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 8px;
      }
      #splash-progress {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #c8930a, #f5c842);
        border-radius: 2px;
        animation: splash-load 1.8s ease-out forwards;
      }
      @keyframes splash-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.95); }
      }
      @keyframes splash-load {
        0% { width: 0%; }
        60% { width: 75%; }
        90% { width: 92%; }
        100% { width: 100%; }
      }
    </style>
  </head>

    <div id="splash" aria-hidden="true">
